<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PIXEL BATTLE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #0a0a0f;
    --panel: #12121a;
    --border: #2a2a3a;
    --accent: #ff2d55;
    --accent2: #0ff;
    --text: #e0e0ff;
    --dim: #555577;
    --header-h: 52px;
    --bottom-h: 170px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(to bottom, transparent, transparent 2px, rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px);
    pointer-events: none;
    z-index: 9999;
  }

  header {
    position: fixed; top: 0; left: 0; right: 0;
    height: var(--header-h);
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 12px;
    z-index: 100;
    gap: 8px;
  }

  .logo {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    color: var(--accent);
    text-shadow: 0 0 10px var(--accent);
    white-space: nowrap; flex-shrink: 0;
  }
  .logo span { color: var(--accent2); text-shadow: 0 0 10px var(--accent2); }

  .online-badge {
    display: flex; align-items: center; gap: 5px;
    font-size: 9px; color: var(--dim); flex-shrink: 0;
  }
  .online-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--dim); transition: background 0.3s; }
  .online-dot.connected { background: #00ff88; box-shadow: 0 0 6px #00ff88; }
  .online-count { color: var(--text); font-family: 'Press Start 2P', monospace; font-size: 8px; }

  .header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

  .cooldown-pill {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    padding: 4px 10px;
  }
  .cooldown-bar-wrap { width: 60px; height: 4px; background: rgba(255,255,255,0.08); overflow: hidden; }
  .cooldown-bar { height: 100%; background: linear-gradient(90deg, var(--accent2), #00ff88); box-shadow: 0 0 6px var(--accent2); transition: width 0.05s linear; }
  .cooldown-value { font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--accent2); min-width: 32px; text-align: center; }
  .cooldown-value.ready { color: #00ff88; animation: pulseGreen 0.4s ease; }
  @keyframes pulseGreen { 0%{transform:scale(1.4)} 100%{transform:scale(1)} }

  .fs-btn {
    background: rgba(255,255,255,0.06); border: 1px solid var(--border);
    color: var(--text); font-size: 18px; width: 36px; height: 36px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s; flex-shrink: 0; user-select: none;
  }
  .fs-btn:hover { background: rgba(255,255,255,0.12); }
  .fs-btn:active { background: rgba(0,255,255,0.1); }

  #canvasArea {
    position: fixed;
    top: var(--header-h); left: 0; right: 0; bottom: var(--bottom-h);
    overflow: hidden; background: var(--bg);
    touch-action: none; cursor: crosshair;
  }

  #canvasViewport { position: absolute; transform-origin: 0 0; will-change: transform; }
  #pixelCanvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
  #gridCanvas { position: absolute; top: 0; left: 0; pointer-events: none; image-rendering: pixelated; }
  #hoverIndicator {
    position: absolute; pointer-events: none;
    border: 2px solid rgba(255,255,255,0.9);
    box-shadow: 0 0 8px rgba(255,255,255,0.4);
    z-index: 5; display: none;
  }

  #loadingOverlay {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 20px; z-index: 1000; transition: opacity 0.5s;
  }
  #loadingOverlay.hidden { opacity: 0; pointer-events: none; }
  .loading-logo { font-family: 'Press Start 2P', monospace; font-size: 16px; color: var(--accent); text-shadow: 0 0 20px var(--accent); }
  .loading-logo span { color: var(--accent2); text-shadow: 0 0 20px var(--accent2); }
  .loading-bar-wrap { width: 200px; height: 4px; background: rgba(255,255,255,0.08); }
  .loading-bar { height: 100%; background: linear-gradient(90deg, var(--accent2), #00ff88); width: 0%; transition: width 0.3s; box-shadow: 0 0 10px var(--accent2); }
  .loading-text { font-size: 10px; color: var(--dim); letter-spacing: 2px; }

  #bottomPanel {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: var(--bottom-h);
    background: var(--panel); border-top: 1px solid var(--border);
    display: flex; flex-direction: column; z-index: 100;
  }

  .bp-top { display: flex; align-items: center; gap: 8px; padding: 8px 12px 4px; flex-shrink: 0; }

  .bp-selected-color {
    width: 36px; height: 36px; border: 2px solid rgba(255,255,255,0.3);
    flex-shrink: 0; cursor: pointer; position: relative;
  }
  .bp-selected-color input[type="color"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer;
    width: 100%; height: 100%; padding: 0; border: none;
  }

  .bp-hex {
    font-family: 'Share Tech Mono', monospace; font-size: 12px;
    color: var(--text); background: rgba(255,255,255,0.04);
    border: 1px solid var(--border); padding: 6px 8px;
    width: 88px; outline: none; text-transform: uppercase;
  }
  .bp-hex:focus { border-color: var(--accent2); }

  .bp-coords { font-size: 10px; color: var(--dim); margin-left: auto; white-space: nowrap; }
  .bp-coords span { color: var(--accent2); }

  .zoom-controls { display: flex; align-items: center; gap: 4px; }
  .zoom-btn {
    background: rgba(255,255,255,0.06); border: 1px solid var(--border);
    color: var(--text); font-size: 16px; width: 32px; height: 32px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    user-select: none; transition: background 0.1s;
  }
  .zoom-btn:active { background: rgba(0,255,255,0.12); }
  .zoom-label { font-size: 10px; color: var(--dim); min-width: 28px; text-align: center; }

  .bp-cooldown { display: flex; align-items: center; gap: 6px; padding: 0 12px 6px; flex-shrink: 0; }
  .bp-cd-label { font-size: 9px; color: var(--dim); white-space: nowrap; }
  .bp-cd-bar-wrap { flex: 1; height: 5px; background: rgba(255,255,255,0.07); overflow: hidden; }
  .bp-cd-bar { height: 100%; background: linear-gradient(90deg, var(--accent2), #00ff88); box-shadow: 0 0 6px var(--accent2); transition: width 0.05s linear; }
  .bp-cd-val { font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--accent2); min-width: 36px; text-align: right; }
  .bp-cd-val.ready { color: #00ff88; }

  .palette-scroll {
    flex: 1; overflow-x: auto; overflow-y: hidden;
    display: flex; align-items: center;
    padding: 4px 12px 8px; gap: 6px; scrollbar-width: none;
  }
  .palette-scroll::-webkit-scrollbar { display: none; }

  .color-swatch {
    width: 32px; height: 32px; flex-shrink: 0;
    border: 2px solid transparent; cursor: pointer;
    transition: transform 0.1s, border-color 0.1s; border-radius: 2px;
  }
  .color-swatch:active { transform: scale(1.2); }
  .color-swatch.active { border-color: #fff; box-shadow: 0 0 8px rgba(255,255,255,0.6); transform: scale(1.15); }

  #sidePanel {
    display: none;
    position: fixed; top: var(--header-h); right: 0;
    width: 220px; bottom: 0;
    background: var(--panel); border-left: 1px solid var(--border);
    flex-direction: column; overflow-y: auto; z-index: 100;
  }

  .sp-section { padding: 14px 16px; border-bottom: 1px solid var(--border); }
  .sp-title { font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--dim); letter-spacing: 2px; margin-bottom: 10px; }
  .sp-palette { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
  .sp-palette .color-swatch { width: 100%; height: auto; aspect-ratio: 1; }
  .sp-color-row { display: flex; align-items: center; gap: 8px; }
  input[type="color"].sp-picker { width: 38px; height: 38px; border: 1px solid var(--border); background: transparent; cursor: pointer; padding: 2px; flex-shrink: 0; }
  .sp-hex { flex: 1; background: rgba(255,255,255,0.04); border: 1px solid var(--border); color: var(--text); font-family: 'Share Tech Mono', monospace; font-size: 12px; padding: 8px; text-transform: uppercase; outline: none; }
  .sp-hex:focus { border-color: var(--accent2); }
  .sp-preview { display: flex; align-items: center; gap: 10px; }
  .sp-preview-swatch { width: 34px; height: 34px; border: 1px solid var(--border); flex-shrink: 0; }
  .sp-preview-label { font-size: 10px; color: var(--dim); line-height: 1.6; }
  .sp-preview-label strong { display: block; color: var(--text); font-size: 12px; }

  .sp-cooldown-wrap { margin-top: 4px; }
  .sp-cd-bar-outer { height: 6px; background: rgba(255,255,255,0.07); border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
  .sp-cd-bar-inner { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent2), #00ff88); box-shadow: 0 0 8px var(--accent2); transition: width 0.05s linear; }
  .sp-cd-val { font-family: 'Press Start 2P', monospace; font-size: 10px; color: var(--accent2); text-align: center; }
  .sp-cd-val.ready { color: #00ff88; }

  .stat-row { display: flex; justify-content: space-between; font-size: 10px; color: var(--dim); margin-bottom: 6px; }
  .stat-row span:last-child { color: var(--text); }

  #flashMsg {
    position: fixed;
    bottom: calc(var(--bottom-h) + 12px); left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--panel); border: 1px solid var(--border);
    padding: 8px 18px; font-size: 11px; letter-spacing: 1px;
    opacity: 0; transition: opacity 0.2s, transform 0.2s;
    pointer-events: none; z-index: 200; white-space: nowrap;
  }
  #flashMsg.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #flashMsg.error { border-color: var(--accent); color: var(--accent); }
  #flashMsg.success { border-color: #00ff88; color: #00ff88; }
  #flashMsg.info    { border-color: var(--accent2); color: var(--accent2); }

  /* ── CHAT ── */
  #chatBtn { position: relative; }
  #chatBadge {
    position: absolute; top: -4px; right: -4px;
    background: var(--accent); color: #fff;
    font-size: 8px; min-width: 14px; height: 14px;
    border-radius: 7px; display: none;
    align-items: center; justify-content: center;
    font-family: 'Press Start 2P', monospace; padding: 0 3px;
    pointer-events: none;
  }
  #chatPanel {
    position: fixed;
    bottom: 60px; right: 10px;
    width: min(300px, calc(100vw - 20px));
    max-height: 360px;
    background: var(--panel);
    border: 1px solid var(--border);
    display: none; flex-direction: column;
    z-index: 500;
    box-shadow: 0 8px 32px rgba(0,0,0,.7);
    animation: chatPop .15s ease;
  }
  @keyframes chatPop { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  #chatPanel.open { display: flex; }
  .chat-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .chat-head-title { font-family:'Press Start 2P',monospace; font-size:7px; color:var(--dim); letter-spacing:2px; }
  #chatMsgs {
    flex: 1; overflow-y: auto; padding: 8px 10px;
    display: flex; flex-direction: column; gap: 5px;
    min-height: 120px;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  #chatMsgs::-webkit-scrollbar { width: 3px; }
  #chatMsgs::-webkit-scrollbar-thumb { background: var(--border); }
  .cmsg { animation: msgIn .12s ease; }
  @keyframes msgIn { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:translateY(0)} }
  .cmsg-meta { font-size: 9px; color: var(--dim); margin-bottom: 2px; }
  .cmsg-text {
    font-size: 11px; color: var(--text); word-break: break-word; line-height: 1.4;
    background: rgba(255,255,255,.04); border-left: 2px solid var(--border);
    padding: 3px 8px;
  }
  .cmsg.mine .cmsg-text { border-left-color: var(--accent2); background: rgba(0,255,255,.05); }
  .cmsg.mine .cmsg-meta { color: var(--accent2); }
  .chat-input-row {
    display: flex; gap: 6px; padding: 7px 8px;
    border-top: 1px solid var(--border); flex-shrink: 0;
  }
  #chatInp {
    flex: 1; background: rgba(255,255,255,.04); border: 1px solid var(--border);
    color: var(--text); font-family: 'Share Tech Mono', monospace;
    font-size: 12px; padding: 6px 9px; outline: none; min-width: 0;
  }
  #chatInp:focus { border-color: var(--accent2); }
  #chatInp::placeholder { color: var(--dim); }
  #chatSend {
    background: rgba(0,255,255,.08); border: 1px solid var(--accent2);
    color: var(--accent2); font-size: 13px;
    padding: 6px 11px; cursor: pointer; flex-shrink: 0;
    transition: background .12s;
  }
  #chatSend:hover { background: rgba(0,255,255,.18); }

  @media (min-width: 700px) {
    :root { --bottom-h: 0px; }
    #bottomPanel { display: none; }
    #canvasArea { right: 220px; bottom: 0; }
    #sidePanel { display: flex; }
    #flashMsg { bottom: 24px; }
    .logo { font-size: 12px; }
    #chatPanel { bottom: 14px; right: 234px; }
  }
</style>
</head>
<body>

<div id="loadingOverlay">
  <div class="loading-logo">PIXEL <span>BATTLE</span></div>
  <div class="loading-bar-wrap"><div class="loading-bar" id="loadingBar"></div></div>
  <div class="loading-text" id="loadingText">ПОДКЛЮЧЕНИЕ...</div>
</div>

<header>
  <div class="logo">PIXEL <span>BATTLE</span></div>
  <div class="online-badge">
    <div class="online-dot" id="onlineDot"></div>
    <span id="onlineCount" class="online-count">—</span>
    <span style="font-size:9px;color:var(--dim);">онлайн</span>
  </div>
  <div class="header-right">
    <div class="cooldown-pill">
      <div class="cooldown-bar-wrap"><div class="cooldown-bar" id="cdBar" style="width:100%"></div></div>
      <div class="cooldown-value ready" id="cdVal">5/5</div>
    </div>
    <button class="fs-btn" id="centerBtn" title="По центру" style="font-size:13px;">⌖</button>
    <button class="fs-btn" id="chatBtn" title="Чат">💬<span id="chatBadge"></span></button>
    <button class="fs-btn" id="fsBtn" title="Полный экран">⛶</button>
  </div>
</header>

<div id="canvasArea">
  <div id="canvasViewport">
    <canvas id="pixelCanvas"></canvas>
    <canvas id="gridCanvas"></canvas>
    <div id="hoverIndicator"></div>
  </div>
</div>

<div id="bottomPanel">
  <div class="bp-top">
    <div class="bp-selected-color" id="bpSwatch">
      <input type="color" id="bpColorPicker" value="#000000">
    </div>
    <input type="text" class="bp-hex" id="bpHexInput" value="#000000" maxlength="7">
    <div class="zoom-controls">
      <button class="zoom-btn" id="zoomOut">−</button>
      <div class="zoom-label" id="zoomLabel">×2</div>
      <button class="zoom-btn" id="zoomIn">+</button>
    </div>
    <div class="bp-coords">X:<span id="coordX">—</span> Y:<span id="coordY">—</span></div>
  </div>
  <div class="bp-cooldown">
    <div class="bp-cd-label">COOLDOWN</div>
    <div class="bp-cd-bar-wrap"><div class="bp-cd-bar" id="cdBarMobile" style="width:100%"></div></div>
    <div class="bp-cd-val ready" id="cdValMobile">5/5</div>
  </div>
  <div class="palette-scroll" id="mobilePalette"></div>
</div>

<div id="sidePanel">
  <div class="sp-section">
    <div class="sp-title">Выбран</div>
    <div class="sp-preview">
      <div class="sp-preview-swatch" id="spSwatch"></div>
      <div class="sp-preview-label">Цвет<strong id="spHex">#000000</strong></div>
    </div>
  </div>
  <div class="sp-section">
    <div class="sp-title">Палитра</div>
    <div class="sp-palette" id="desktopPalette"></div>
  </div>
  <div class="sp-section">
    <div class="sp-title">Свой цвет</div>
    <div class="sp-color-row">
      <input type="color" class="sp-picker" id="spColorPicker" value="#000000">
      <input type="text" class="sp-hex" id="spHexInput" value="#000000" maxlength="7">
    </div>
  </div>
  <div class="sp-section">
    <div class="sp-title">Пиксели</div>
    <div class="sp-cooldown-wrap">
      <div style="display:flex;gap:6px;margin-bottom:8px;" id="ammoDots"></div>
      <div class="sp-cd-bar-outer"><div class="sp-cd-bar-inner" id="cdBarSide" style="width:100%"></div></div>
      <div class="sp-cd-val ready" id="cdValSide">5/5</div>
      <div style="font-size:9px;color:var(--dim);text-align:center;margin-top:4px;">+1 каждые 2 сек</div>
    </div>
  </div>
  <div class="sp-section">
    <div class="sp-title">Зум</div>
    <div style="display:flex;align-items:center;gap:6px;margin-top:2px;">
      <button class="zoom-btn" id="spZoomOut">−</button>
      <div class="zoom-label" id="spZoomLabel">×2</div>
      <button class="zoom-btn" id="spZoomIn">+</button>
      <span style="font-size:9px;color:var(--dim);margin-left:4px;">колесо</span>
    </div>
  </div>
  <div class="sp-section">
    <div class="sp-title">Статистика</div>
    <div class="stat-row"><span>Поставлено</span><span id="statPlaced">0</span></div>
    <div class="stat-row"><span>Всего на холсте</span><span id="statTotal">0</span></div>
    <div class="stat-row"><span>Холст</span><span>250×250</span></div>
    <div class="stat-row"><span>Запас</span><span>5 пикс.</span></div>
    <div class="stat-row"><span>Пополнение</span><span>каждые 2с</span></div>
    <div class="stat-row" style="margin-top:6px;">
      <span>X:<span id="spCoordX" style="color:var(--accent2)">—</span></span>
      <span>Y:<span id="spCoordY" style="color:var(--accent2)">—</span></span>
    </div>
  </div>
</div>

<div id="chatPanel">
  <div class="chat-head">
    <div class="chat-head-title">💬 АНОНИМНЫЙ ЧАТ</div>
  </div>
  <div id="chatMsgs"></div>
  <div class="chat-input-row">
    <input id="chatInp" type="text" placeholder="Написать..." maxlength="120" autocomplete="off">
    <button id="chatSend">➤</button>
  </div>
</div>

<div id="flashMsg"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, onDisconnect, push, remove, query, limitToLast }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD4mw8bp2gsAYLY_jTtuN1JH24IoTllLNk",
  authDomain: "batles-pix.firebaseapp.com",
  databaseURL: "https://batles-pix-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "batles-pix",
  storageBucket: "batles-pix.firebasestorage.app",
  messagingSenderId: "1049222637376",
  appId: "1:1049222637376:web:71a4c5fcf0c132fba47ca5"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

const COLS = 250, ROWS = 250;
const REFILL_MS = 2000;  // каждые 2 сек +1 пиксель
const MAX_AMMO  = 5;     // максимум 5 пикселей

const PALETTE = [
  '#ffffff','#e4e4e4','#888888','#444444','#222222','#000000',
  '#ffa7d1','#e50000','#e59500','#a06a42','#e5d900','#94e044',
  '#02be01','#00d3dd','#0083c7','#0000ea','#cf6ee4','#820080',
  '#ff6d00','#ff00ff','#00ff00','#00ffff','#ff4500','#ff85c3',
  '#6d001a','#be0039','#ff9600','#ffd635','#fff8b8','#00a368',
];

let zoom = 2;
let selectedColor = '#000000';
let pixelsPlaced = 0;
let totalPixels = 0;
let panX = 0, panY = 0;
let isPanning = false;
let panStartX = 0, panStartY = 0, panStartTX = 0, panStartTY = 0;
let touches = {};
let lastPinchDist = null;
let touchMoved = false;
let touchStartX = 0, touchStartY = 0;
let touchPanStartTX = 0, touchPanStartTY = 0;
let touchPanCenterX = 0, touchPanCenterY = 0;
let ammo = MAX_AMMO;        // текущий запас пикселей
let lastRefillTime = Date.now(); // время последнего пополнения
let refillAnimating = false;

const canvasArea  = document.getElementById('canvasArea');
const viewport    = document.getElementById('canvasViewport');
const pixelCanvas = document.getElementById('pixelCanvas');
const gridCanvas  = document.getElementById('gridCanvas');
const ctx  = pixelCanvas.getContext('2d');
const gctx = gridCanvas.getContext('2d');
const hoverEl = document.getElementById('hoverIndicator');

// All cooldown elements
const cdEls = {
  bars: [document.getElementById('cdBar'), document.getElementById('cdBarMobile'), document.getElementById('cdBarSide')],
  vals: [document.getElementById('cdVal'), document.getElementById('cdValMobile'), document.getElementById('cdValSide')],
};

// Pixel buffer
const pixels = new Uint8ClampedArray(COLS * ROWS * 4);
for (let i = 0; i < pixels.length; i += 4) {
  pixels[i]=255; pixels[i+1]=255; pixels[i+2]=255; pixels[i+3]=255;
}

const offscreen = document.createElement('canvas');
offscreen.width = COLS; offscreen.height = ROWS;
const octx = offscreen.getContext('2d');

function hexToRGB(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}
function setPixelLocal(x, y, hex) {
  const [r,g,b] = hexToRGB(hex);
  const idx = (y*COLS+x)*4;
  pixels[idx]=r; pixels[idx+1]=g; pixels[idx+2]=b; pixels[idx+3]=255;
}
function redraw() {
  const id = octx.createImageData(COLS, ROWS);
  id.data.set(pixels);
  octx.putImageData(id, 0, 0);
  ctx.imageSmoothingEnabled = false;
  ctx.clearRect(0,0,pixelCanvas.width,pixelCanvas.height);
  ctx.drawImage(offscreen, 0, 0, COLS*zoom, ROWS*zoom);
}
function drawGrid() {
  gctx.clearRect(0,0,gridCanvas.width,gridCanvas.height);
  if (zoom < 4) return;
  gctx.strokeStyle='rgba(255,255,255,0.06)';
  gctx.lineWidth=0.5;
  for(let x=0;x<=COLS;x++){gctx.beginPath();gctx.moveTo(x*zoom,0);gctx.lineTo(x*zoom,ROWS*zoom);gctx.stroke();}
  for(let y=0;y<=ROWS;y++){gctx.beginPath();gctx.moveTo(0,y*zoom);gctx.lineTo(COLS*zoom,y*zoom);gctx.stroke();}
}
function centerCanvas() {
  panX = (canvasArea.clientWidth  - COLS * zoom) / 2;
  panY = (canvasArea.clientHeight - ROWS * zoom) / 2;
  applyViewport();
}

function applyViewport() {
  viewport.style.transformOrigin = '0 0';
  viewport.style.transform = `translate(${Math.round(panX)}px,${Math.round(panY)}px)`;
}

function clampPan() {
  const aw = canvasArea.clientWidth, ah = canvasArea.clientHeight;
  const margin = 80;
  panX = Math.min(aw - margin, Math.max(margin - COLS * zoom, panX));
  panY = Math.min(ah - margin, Math.max(margin - ROWS * zoom, panY));
}

function setZoom(z, ox, oy) {
  const oldZoom = zoom;
  zoom = Math.max(1, Math.min(16, Math.round(z)));
  if (zoom === oldZoom) return;

  const cx = (ox != null) ? ox : canvasArea.clientWidth  / 2;
  const cy = (oy != null) ? oy : canvasArea.clientHeight / 2;
  const scale = zoom / oldZoom;
  panX = cx - (cx - panX) * scale;
  panY = cy - (cy - panY) * scale;

  const cw = COLS * zoom, ch = ROWS * zoom;
  pixelCanvas.width = cw; pixelCanvas.height = ch;
  gridCanvas.width  = cw; gridCanvas.height  = ch;
  clampPan();
  ['zoomLabel','spZoomLabel'].forEach(id =>
    document.getElementById(id).textContent = '×' + zoom);
  redraw(); drawGrid(); applyViewport();
}

// ── ПИНЧ — простой и плавный ──
let pinchActive    = false;
let pinchStartDist = 0;
let pinchStartZoom = 0;
let pinchStartPanX = 0, pinchStartPanY = 0;
let pinchCenterX   = 0, pinchCenterY   = 0;
let lastPinchZoom  = 0; // последний зум при котором пересоздавали canvas


// Ammo UI — показывает патроны и прогресс пополнения
function updateAmmoUI() {
  const now = Date.now();

  // Пополняем патроны если прошло достаточно времени
  if (ammo < MAX_AMMO) {
    const elapsed = now - lastRefillTime;
    if (elapsed >= REFILL_MS) {
      const refilled = Math.floor(elapsed / REFILL_MS);
      ammo = Math.min(MAX_AMMO, ammo + refilled);
      lastRefillTime = now - (elapsed % REFILL_MS);
    }
  }

  // Прогресс до следующего пополнения
  const pct = ammo >= MAX_AMMO
    ? 100
    : ((Date.now() - lastRefillTime) / REFILL_MS) * 100;

  const remaining = ammo >= MAX_AMMO
    ? 0
    : Math.max(0, REFILL_MS - (Date.now() - lastRefillTime)) / 1000;

  // Текст: "3/5" или "5/5"
  const text = ammo + '/' + MAX_AMMO;
  const ready = ammo >= MAX_AMMO;

  cdEls.bars.forEach(b => b.style.width = pct + '%');
  cdEls.vals.forEach((v, i) => {
    v.textContent = text;
    const readyCls   = i === 0 ? 'cooldown-value ready' : i === 1 ? 'bp-cd-val ready' : 'sp-cd-val ready';
    const normalCls  = i === 0 ? 'cooldown-value'       : i === 1 ? 'bp-cd-val'       : 'sp-cd-val';
    v.className = ready ? readyCls : normalCls;
  });

  // Рисуем точки-патроны (только в сайдбаре на десктопе)
  updateAmmoDots();

  if (ammo < MAX_AMMO) {
    requestAnimationFrame(updateAmmoUI);
  } else {
    refillAnimating = false;
  }
}

function startAmmoAnimation() {
  if (!refillAnimating) {
    refillAnimating = true;
    lastRefillTime = Date.now();
    requestAnimationFrame(updateAmmoUI);
  }
}

// Точки-патроны под баром
function updateAmmoDots() {
  let dotsEl = document.getElementById('ammoDots');
  if (!dotsEl) return;
  dotsEl.innerHTML = '';
  for (let i = 0; i < MAX_AMMO; i++) {
    const dot = document.createElement('div');
    dot.style.cssText = `
      width:12px;height:12px;border-radius:50%;flex-shrink:0;
      background:${i < ammo ? '#00ff88' : 'rgba(255,255,255,0.1)'};
      box-shadow:${i < ammo ? '0 0 6px #00ff88' : 'none'};
      border:1px solid ${i < ammo ? '#00ff88' : 'rgba(255,255,255,0.2)'};
      transition:background 0.2s,box-shadow 0.2s;
    `;
    dotsEl.appendChild(dot);
  }
}

// Loading
function setLoading(pct, text) {
  document.getElementById('loadingBar').style.width = pct + '%';
  document.getElementById('loadingText').textContent = text;
}
function hideLoading() {
  const ov = document.getElementById('loadingOverlay');
  ov.classList.add('hidden');
  setTimeout(() => ov.remove(), 600);
}

// Firebase
const canvasRef   = ref(db, 'canvas');
const presenceRef = ref(db, 'presence');

setLoading(20, 'ЗАГРУЗКА ХОЛСТА...');

// Load once
onValue(canvasRef, (snap) => {
  const data = snap.val();
  setLoading(80, 'РИСУЕМ ПИКСЕЛИ...');
  for (let i = 0; i < pixels.length; i += 4) {
    pixels[i]=255; pixels[i+1]=255; pixels[i+2]=255; pixels[i+3]=255;
  }
  let count = 0;
  if (data) {
    Object.entries(data).forEach(([key, hex]) => {
      const [x, y] = key.split('_').map(Number);
      if (x >= 0 && x < COLS && y >= 0 && y < ROWS && typeof hex === 'string') {
        setPixelLocal(x, y, hex); count++;
      }
    });
  }
  totalPixels = count;
  document.getElementById('statTotal').textContent = totalPixels;
  setZoom(2); centerCanvas();
  redraw(); drawGrid();
  setLoading(100, 'ГОТОВО!');
  setTimeout(hideLoading, 400);
}, { onlyOnce: true });

// Realtime
onValue(canvasRef, (snap) => {
  const data = snap.val();
  for (let i = 0; i < pixels.length; i += 4) {
    pixels[i]=255; pixels[i+1]=255; pixels[i+2]=255; pixels[i+3]=255;
  }
  let count = 0;
  if (data) {
    Object.entries(data).forEach(([key, hex]) => {
      const [x, y] = key.split('_').map(Number);
      if (x >= 0 && x < COLS && y >= 0 && y < ROWS && typeof hex === 'string') {
        setPixelLocal(x, y, hex); count++;
      }
    });
  }
  totalPixels = count;
  document.getElementById('statTotal').textContent = totalPixels;
  redraw();
});

// Presence
const myPresenceRef = push(presenceRef);
set(myPresenceRef, { online: true, t: Date.now() });
onDisconnect(myPresenceRef).remove();
onValue(presenceRef, (snap) => {
  const count = snap.exists() ? Object.keys(snap.val()).length : 0;
  document.getElementById('onlineCount').textContent = count;
  document.getElementById('onlineDot').classList.toggle('connected', count > 0);
});

function handlePlace(x, y) { placePixel(x, y); }

async function placePixel(x, y) {
  if (x < 0 || x >= COLS || y < 0 || y >= ROWS) return;

  // Обновим патроны перед проверкой
  if (ammo < MAX_AMMO) {
    const elapsed = Date.now() - lastRefillTime;
    const refilled = Math.floor(elapsed / REFILL_MS);
    if (refilled > 0) {
      ammo = Math.min(MAX_AMMO, ammo + refilled);
      lastRefillTime = Date.now() - (elapsed % REFILL_MS);
    }
  }

  if (ammo <= 0) {
    const rem = ((REFILL_MS - (Date.now() - lastRefillTime)) / 1000).toFixed(1);
    showFlash('Нет пикселей! Ещё ' + rem + ' сек...', 'error');
    return;
  }

  ammo--;
  if (ammo < MAX_AMMO) startAmmoAnimation();
  updateAmmoUI();

  setPixelLocal(x, y, selectedColor);
  redraw();
  try {
    await set(ref(db, `canvas/${x}_${y}`), selectedColor);
    pixelsPlaced++;
    document.getElementById('statPlaced').textContent = pixelsPlaced;
    showFlash('(' + x + ',' + y + ') ✓', 'success');
  } catch(e) {
    showFlash('Ошибка сети!', 'error');
  }
}

// Palettes
function buildPalette(id, isDesktop) {
  const el = document.getElementById(id);
  PALETTE.forEach(hex => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch';
    sw.style.background = hex;
    sw.dataset.hex = hex;
    sw.addEventListener('click', () => selectColor(hex));
    if (isDesktop) { sw.style.width='100%'; sw.style.height='auto'; }
    el.appendChild(sw);
  });
}
buildPalette('mobilePalette', false);
buildPalette('desktopPalette', true);

function selectColor(hex) {
  hex = hex.toLowerCase();
  if (!/^#[0-9a-f]{6}$/.test(hex)) return;
  selectedColor = hex;
  document.querySelectorAll('.color-swatch').forEach(s=>s.classList.toggle('active', s.dataset.hex===hex));
  document.getElementById('bpSwatch').style.background  = hex;
  document.getElementById('bpColorPicker').value        = hex;
  document.getElementById('bpHexInput').value           = hex.toUpperCase();
  document.getElementById('spColorPicker').value        = hex;
  document.getElementById('spHexInput').value           = hex.toUpperCase();
  document.getElementById('spSwatch').style.background  = hex;
  document.getElementById('spHex').textContent          = hex.toUpperCase();
}
selectColor('#000000');

['bpColorPicker','spColorPicker'].forEach(id => {
  const p = document.getElementById(id);
  p.addEventListener('input', () => selectColor(p.value));
});
['bpHexInput','spHexInput'].forEach(id => {
  const h = document.getElementById(id);
  h.addEventListener('input', () => { let v=h.value; if(!v.startsWith('#'))v='#'+v; if(/^#[0-9a-f]{6}$/i.test(v))selectColor(v); });
});

function areaToPixel(ax, ay) {
  return { x: Math.floor((ax-panX)/zoom), y: Math.floor((ay-panY)/zoom) };
}
function setCoords(x,y) {
  const xs=(x>=0&&x<COLS)?x:'—', ys=(y>=0&&y<ROWS)?y:'—';
  ['coordX','spCoordX'].forEach(id => document.getElementById(id).textContent = xs);
  ['coordY','spCoordY'].forEach(id => document.getElementById(id).textContent = ys);
}

// Mouse
canvasArea.addEventListener('mousedown', e=>{
  if(e.button!==0) return;
  isPanning=false; panStartX=e.clientX; panStartY=e.clientY; panStartTX=panX; panStartTY=panY;
});
canvasArea.addEventListener('mousemove', e=>{
  const rect=canvasArea.getBoundingClientRect();
  const {x,y}=areaToPixel(e.clientX-rect.left, e.clientY-rect.top);
  setCoords(x,y);
  if(x>=0&&x<COLS&&y>=0&&y<ROWS){
    hoverEl.style.display='block';
    hoverEl.style.left=(panX+x*zoom)+'px'; hoverEl.style.top=(panY+y*zoom)+'px';
    hoverEl.style.width=zoom+'px'; hoverEl.style.height=zoom+'px';
  } else hoverEl.style.display='none';
  if(e.buttons===1){
    const dx=e.clientX-panStartX, dy=e.clientY-panStartY;
    if(Math.abs(dx)>4||Math.abs(dy)>4){ isPanning=true; panX=panStartTX+dx; panY=panStartTY+dy; clampPan(); applyViewport(); hoverEl.style.display='none'; }
  }
});
canvasArea.addEventListener('mouseup', e=>{
  if(e.button!==0) return;
  if(!isPanning){ const rect=canvasArea.getBoundingClientRect(); const {x,y}=areaToPixel(e.clientX-rect.left,e.clientY-rect.top); placePixel(x,y); }
  isPanning=false;
});
canvasArea.addEventListener('mouseleave',()=>{ hoverEl.style.display='none'; isPanning=false; setCoords(-1,-1); });
canvasArea.addEventListener('wheel',e=>{ e.preventDefault(); const rect=canvasArea.getBoundingClientRect(); setZoom(zoom+(e.deltaY<0?1:-1),e.clientX-rect.left,e.clientY-rect.top); },{passive:false});

// ── Touch handlers ──
function tDist(a,b){ return Math.hypot(a.clientX-b.clientX, a.clientY-b.clientY); }
function tCenter(a,b){ return { x:(a.clientX+b.clientX)/2, y:(a.clientY+b.clientY)/2 }; }

canvasArea.addEventListener('touchstart', e => {
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t => touches[t.identifier] = t);
  const ids = Object.keys(touches);
  touchMoved = false;

  if (ids.length === 1) {
    pinchActive = false;
    const t = touches[ids[0]];
    touchStartX = t.clientX; touchStartY = t.clientY;
    touchPanStartTX = panX;  touchPanStartTY = panY;
  }

  if (ids.length === 2) {
    const [a, b] = ids.map(i => touches[i]);
    const rect = canvasArea.getBoundingClientRect();
    const c = tCenter(a, b);
    pinchActive     = true;
    pinchStartDist  = tDist(a, b);
    pinchStartZoom  = zoom;
    pinchStartPanX  = panX;
    pinchStartPanY  = panY;
    pinchCenterX    = c.x - rect.left;
    pinchCenterY    = c.y - rect.top;
    lastPinchZoom   = zoom;
  }
}, { passive: false });

canvasArea.addEventListener('touchmove', e => {
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t => touches[t.identifier] = t);
  const ids = Object.keys(touches);

  if (ids.length === 1 && !pinchActive) {
    const t = touches[ids[0]];
    const dx = t.clientX - touchStartX;
    const dy = t.clientY - touchStartY;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) touchMoved = true;
    panX = touchPanStartTX + dx;
    panY = touchPanStartTY + dy;
    clampPan();
    applyViewport();
  }

  if (ids.length === 2 && pinchActive) {
    touchMoved = true;
    const [a, b] = ids.map(i => touches[i]);
    const dist = tDist(a, b);
    const rect = canvasArea.getBoundingClientRect();
    const c = tCenter(a, b);
    const cx = c.x - rect.left;
    const cy = c.y - rect.top;

    // Вычисляем новый зум относительно startZoom
    const ratio    = dist / pinchStartDist;
    const rawZoom  = pinchStartZoom * ratio;
    const newZoom  = Math.max(1, Math.min(16, Math.round(rawZoom)));

    // Пересчитываем pan — точка пинча не двигается
    const scale = newZoom / pinchStartZoom;
    const newPanX = pinchCenterX - (pinchCenterX - pinchStartPanX) * scale;
    const newPanY = pinchCenterY - (pinchCenterY - pinchStartPanY) * scale;

    // Обновляем canvas только если зум изменился
    if (newZoom !== zoom) {
      zoom = newZoom;
      panX = newPanX;
      panY = newPanY;
      const cw = COLS * zoom, ch = ROWS * zoom;
      pixelCanvas.width = cw; pixelCanvas.height = ch;
      gridCanvas.width  = cw; gridCanvas.height  = ch;
      clampPan();
      ['zoomLabel','spZoomLabel'].forEach(id =>
        document.getElementById(id).textContent = '×' + zoom);
      redraw(); drawGrid();
    } else {
      // Зум не изменился — просто двигаем pan (перетаскивание двумя пальцами)
      panX = newPanX;
      panY = newPanY;
      clampPan();
    }
    applyViewport();
  }
}, { passive: false });

canvasArea.addEventListener('touchend', e => {
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t => delete touches[t.identifier]);
  const ids = Object.keys(touches);

  if (ids.length === 0) {
    if (!touchMoved && !pinchActive) {
      const t = e.changedTouches[0];
      const rect = canvasArea.getBoundingClientRect();
      const { x, y } = areaToPixel(t.clientX - rect.left, t.clientY - rect.top);
      handlePlace(x, y);
    }
    pinchActive = false;
  }

  if (ids.length === 1) {
    pinchActive = false;
    const t = touches[ids[0]];
    touchStartX    = t.clientX; touchStartY    = t.clientY;
    touchPanStartTX = panX;     touchPanStartTY = panY;
  }
}, { passive: false });

// Zoom buttons
document.getElementById('zoomIn').addEventListener('click',   ()=>setZoom(zoom+1));
document.getElementById('zoomOut').addEventListener('click',  ()=>setZoom(zoom-1));
document.getElementById('spZoomIn').addEventListener('click', ()=>setZoom(zoom+1));
document.getElementById('spZoomOut').addEventListener('click',()=>setZoom(zoom-1));

// Fullscreen
const fsBtn=document.getElementById('fsBtn');
document.getElementById('centerBtn').addEventListener('click', () => {
  setZoom(2); centerCanvas();
});
fsBtn.addEventListener('click',()=>{ if(!document.fullscreenElement)document.documentElement.requestFullscreen().catch(()=>{}); else document.exitFullscreen(); });
document.addEventListener('fullscreenchange',()=>{ fsBtn.textContent=document.fullscreenElement?'✕':'⛶'; setTimeout(centerCanvas,150); });

function showFlash(msg,type){
  const el=document.getElementById('flashMsg');
  el.textContent=msg; el.className='show '+type;
  clearTimeout(el._t); el._t=setTimeout(()=>el.className=type,1800);
}

window.addEventListener('resize',()=>setTimeout(centerCanvas,50));

// Инициализация патронов
updateAmmoUI();

// ═══════════════════════════════════════
// АНОНИМНЫЙ ЧАТ
// ═══════════════════════════════════════
const MY_SID = Math.random().toString(36).slice(2,8);
let chatOpen = false;
let unread   = 0;
let lastSeen = Date.now();

const chatPanel = document.getElementById('chatPanel');
const chatBadge = document.getElementById('chatBadge');
const chatMsgs  = document.getElementById('chatMsgs');
const chatInp   = document.getElementById('chatInp');
const chatSend  = document.getElementById('chatSend');
const chatBtn   = document.getElementById('chatBtn');

// Открыть/закрыть
chatBtn.addEventListener('click', e => {
  e.stopPropagation();
  chatOpen = !chatOpen;
  chatPanel.classList.toggle('open', chatOpen);
  if (chatOpen) {
    unread = 0;
    chatBadge.style.display = 'none';
    lastSeen = Date.now();
    requestAnimationFrame(() => chatMsgs.scrollTop = chatMsgs.scrollHeight);
    setTimeout(() => chatInp.focus(), 60);
  }
});

document.addEventListener('click', e => {
  if (chatOpen && !chatPanel.contains(e.target) && e.target !== chatBtn) {
    chatOpen = false;
    chatPanel.classList.remove('open');
  }
});

// Отправить
function sendMsg() {
  const text = chatInp.value.trim().slice(0, 120);
  if (!text) return;
  chatInp.value = '';
  push(ref(db, 'chat'), { text, s: MY_SID, t: Date.now() });
}
chatSend.addEventListener('click', sendMsg);
chatInp.addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); sendMsg(); }
  if (e.key === 'Escape') { chatOpen = false; chatPanel.classList.remove('open'); }
});

// Слушаем сообщения
onValue(query(ref(db,'chat'), limitToLast(80)), snap => {
  const data = snap.val();
  chatMsgs.innerHTML = '';
  if (!data) return;

  Object.values(data)
    .sort((a,b) => a.t - b.t)
    .forEach(msg => {
      const isMe = msg.s === MY_SID;
      const d = document.createElement('div');
      d.className = 'cmsg' + (isMe ? ' mine' : '');
      const t = new Date(msg.t);
      const time = t.getHours().toString().padStart(2,'0') + ':' + t.getMinutes().toString().padStart(2,'0');
      d.innerHTML = `<div class="cmsg-meta">${isMe?'ты':'аноним'} · ${time}</div>`
                  + `<div class="cmsg-text">${msg.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>`;
      chatMsgs.appendChild(d);

      if (!isMe && msg.t > lastSeen && !chatOpen) unread++;
    });

  if (chatOpen) {
    unread = 0;
    chatBadge.style.display = 'none';
    requestAnimationFrame(() => chatMsgs.scrollTop = chatMsgs.scrollHeight);
  } else if (unread > 0) {
    chatBadge.textContent = unread > 9 ? '9+' : unread;
    chatBadge.style.display = 'flex';
    lastSeen = Date.now();
    unread = 0;
  }
});
